name: Lint

permissions:
  contents: read

on:
  pull_request:
    branches: [main]

jobs:
  tox-codecov:
    name: Tox - Linting & Testing
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: |
            3.12
            3.13
            3.14
            3.11

      - name: Install lint & testing dependencies
        run: |
          python -m pip install --group testsuite
          python -m pip install tox
          python -m pip install -e .

      - name: Run Pytest for coverage
        run: pytest -s -vv --cov=mcp_project_context_server --cov-report term-missing  --cov-report=xml --junitxml=junit.xml -o junit_family=legacy tests/

      - name: Run Tox
        run: tox

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          fail_ci_if_error: true
          verbose: true

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/test-results-action@v1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  tools-tests:
    name: Tools - build_and_publish.py Tests
    runs-on: ubuntu-latest
    needs: tox-codecov

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install test dependencies
        run: python -m pip install pytest pytest-cov

      - name: Run build_and_publish tests with coverage
        working-directory: .github/tools
        run: |
          pytest test_build_and_publish.py -v \
            --cov=build_and_publish \
            --cov-report=term-missing \
            --cov-fail-under=99

