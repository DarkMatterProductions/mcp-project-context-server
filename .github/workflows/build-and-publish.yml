name: Build and Publish

on:
  push:
    branches:
      - main

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      id-token: write

    environment:
      name: dmp-pypi
      url: https://pypi.org/p/mcp-project-context-server

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install build dependencies
        run: pip install build

      - name: Run build and publish script
        id: versioning
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python .github/tools/build-and-publish.py --build --publish

      - name: Publish package distributions to PyPI
        if: steps.versioning.outputs.bump != 'none'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          print-hash: true
